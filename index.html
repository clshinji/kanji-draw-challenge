<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>かんじれんしゅう</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ホーム画面 -->
  <div id="screen-home" class="screen active">
    <div class="home-container">
      <h1 class="home-title">かんじ<br>れんしゅう</h1>
      <p class="home-subtitle">小学2年生</p>
      <div class="home-stats" id="home-stats"></div>
      <button class="btn btn-primary btn-large" id="btn-start">
        はじめる
      </button>
    </div>
  </div>

  <!-- 漢字えらび画面 -->
  <div id="screen-select" class="screen">
    <header class="header">
      <button class="btn btn-back" id="btn-back-home">
        <span class="btn-back-icon">&#8249;</span> もどる
      </button>
      <h2 class="header-title">かんじをえらぼう</h2>
      <div class="header-spacer"></div>
    </header>
    <div class="category-tabs" id="category-tabs"></div>
    <div class="kanji-grid-container">
      <div class="kanji-grid" id="kanji-grid"></div>
    </div>
  </div>

  <!-- れんしゅう画面 -->
  <div id="screen-practice" class="screen">
    <header class="header">
      <button class="btn btn-back" id="btn-back-select">
        <span class="btn-back-icon">&#8249;</span> もどる
      </button>
      <h2 class="header-title" id="practice-title">れんしゅう</h2>
      <div class="header-spacer"></div>
    </header>
    <div class="practice-container">
      <div class="practice-info">
        <div class="kanji-info" id="kanji-info"></div>
      </div>
      <div class="canvas-area">
        <div class="hanzi-wrapper" id="hanzi-wrapper">
          <div id="hanzi-target" class="hanzi-target"></div>
        </div>
      </div>
      <div class="practice-controls">
        <button class="btn btn-control" id="btn-stroke-order">
          <span class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3L21 7L7 21H3V17L17 3Z"/><path d="M14 6L18 10"/></svg></span>
          <span>かきじゅん</span>
        </button>
        <button class="btn btn-control" id="btn-clear">
          <span class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="14" height="7" rx="2"/><path d="M17 14L21 6H7L3 14"/></svg></span>
          <span>けす</span>
        </button>
        <button class="btn btn-control btn-done" id="btn-done">
          <span class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg></span>
          <span>できた！</span>
        </button>
      </div>
    </div>

    <!-- フィードバックオーバーレイ -->
    <div class="feedback-overlay" id="feedback-overlay">
      <div class="feedback-card" id="feedback-card">
        <div class="feedback-stamp" id="feedback-stamp"></div>
        <p class="feedback-message" id="feedback-message"></p>
        <div class="feedback-stars" id="feedback-stars"></div>
        <div class="feedback-buttons">
          <button class="btn btn-control" id="btn-retry">
            <span class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4V10H7"/><path d="M3.51 15A9 9 0 1 0 5 6L1 10"/></svg></span>
            <span>もういちど</span>
          </button>
          <button class="btn btn-primary" id="btn-next">
            <span>つぎへ</span>
          </button>
        </div>
      </div>
      <canvas id="canvas-particles" class="particles-canvas"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <script src="js/kanji-data.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/canvas-drawing.js"></script>
  <script src="js/stroke-guide.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
